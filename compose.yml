services:
  db:
    image: postgis/postgis:16-3.4
    container_name: city-game-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: territory
      POSTGRES_USER: territory
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U territory -d territory"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
